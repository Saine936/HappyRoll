<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/happyrolllogo.jpg" />
		<link rel="apple-touch-icon" href="/happyrolllogo.jpg" />
		<meta name="generator" content="Hostinger Horizons" />

		<meta name="theme-color" content="#264A35" />
		<title>Happy Rolls | Ottawa's Premium Dessert Café</title>
		<style>
			#app-splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#FAFAF8;transition:opacity .5s ease}
			#app-splash.hide{opacity:0;pointer-events:none}
			#app-splash img{width:104px;height:104px;animation:splashPulse 1.6s ease-in-out infinite}
			@keyframes splashPulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}}
			@media (prefers-reduced-motion: reduce){#app-splash img{animation:none}}
		</style>
	</head>
	<body>
		<div id="app-splash"><img src="/happyrolllogo.jpg" alt="Happy Rolls" /></div>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
